version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: doctor_appointment_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: doctor_appointment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doctor_appointment_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/doctor_appointment
      - JWT_SECRET=supersecretjwtkey
      - PORT=5000
      - NODE_ENV=production
      - SEED_DATA=true
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: doctor_appointment_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
